<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — Hellodev</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="../css/admin.css" />
</head>
<body class="login-page">

  <div class="login-card">
    <div class="login-logo">
      <div class="logo-text">Hello<span class="accent">dev</span></div>
      <div class="login-badge">Admin Portal</div>
    </div>

    <h1 class="login-title">Welcome back</h1>
    <p class="login-subtitle">Sign in to manage your portfolio</p>

    <form id="login-form" novalidate>
      <div class="form-group">
        <label for="admin-email" class="form-label">Email Address</label>
        <input
          type="email"
          id="admin-email"
          class="form-input"
          placeholder="admin@hellodev.com"
          autocomplete="email"
          required
        />
      </div>
      <div class="form-group">
        <label for="admin-password" class="form-label">Password</label>
        <input
          type="password"
          id="admin-password"
          class="form-input"
          placeholder="••••••••"
          autocomplete="current-password"
          required
        />
      </div>
      <button type="submit" class="btn-primary" id="login-btn" style="margin-top: 8px;">
        <span id="login-text">Sign In</span>
      </button>
    </form>

    <div class="login-error" id="login-error"></div>

    <p style="text-align:center; margin-top:24px; font-size:0.82rem; color:var(--text-subtle);">
      <a href="../index.html" style="color:var(--accent); font-weight:600;">← Back to website</a>
    </p>
  </div>

  <script src="../js/supabase-config.js"></script>
  <script>
    // Redirect if already logged in
    supabaseClient.auth.getSession().then(({ data: { session } }) => {
      if (session) window.location.href = '/admin/dashboard.html';
    });

    const form = document.getElementById('login-form');
    const loginBtn = document.getElementById('login-btn');
    const loginText = document.getElementById('login-text');
    const loginError = document.getElementById('login-error');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = document.getElementById('admin-email').value.trim();
      const password = document.getElementById('admin-password').value;

      if (!email || !password) {
        showError('Please enter your email and password.');
        return;
      }

      loginBtn.disabled = true;
      loginText.textContent = 'Signing in...';
      loginError.style.display = 'none';

      try {
        const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });

        if (error) {
          showError(error.message || 'Invalid credentials. Please try again.');
          loginBtn.disabled = false;
          loginText.textContent = 'Sign In';
          return;
        }

        window.location.href = '/admin/dashboard.html';
      } catch (err) {
        showError('Connection error. Please try again.');
        loginBtn.disabled = false;
        loginText.textContent = 'Sign In';
      }
    });

    function showError(msg) {
      loginError.textContent = msg;
      loginError.style.display = 'block';
    }
  </script>
</body>
</html>
